<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Arka Belajar</title>
  
  <meta name="theme-color" content="#4ade80">
  <link rel="manifest" href="manifest.json">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fredoka', sans-serif; background-color: #7dd3fc; background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)), linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)); background-size: 60px 60px; color: #1e293b; min-height: 100vh; overflow-x: hidden; }
    .header { background: #4ade80; padding: 1rem; display: flex; justify-content: center; align-items: center; border-bottom: 8px solid #713f12; border-top: 4px solid #bbf7d0; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; color: white; cursor: pointer; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; letter-spacing: 1px; text-align: center; }
    .container { padding: 1.5rem; width: 100%; max-width: 1200px; margin: 0 auto; min-height: 80vh; }
    .nav-top { display: none; margin-bottom: 1.5rem; align-items: center; gap: 1rem; }
    .btn-back { background: #fde047; border: 3px solid #000; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 0.6rem; box-shadow: 3px 3px 0 #000; transition: all 0.1s; }
    .btn-back:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }
    .page-title { font-family: 'Press Start 2P', cursive; font-size: 1rem; color: #fff; text-shadow: 2px 2px 0 #000; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; }
    .card { background: #fff; border-radius: 15px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; border: 4px solid #000; box-shadow: 5px 5px 0 rgba(0,0,0,0.8); transition: all 0.1s; }
    .card:active { transform: translate(5px, 5px); box-shadow: 0 0 0 rgba(0,0,0,0.8); }
    .card i { font-size: 3rem; color: #fff; margin-bottom: 1rem; text-shadow: 3px 3px 0 #000; }
    .card h2 { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; line-height: 1.5; color: #000; }
    .card:nth-child(1n) { background: #fca5a5; } .card:nth-child(2n) { background: #fde047; } .card:nth-child(3n) { background: #86efac; } .card:nth-child(4n) { background: #93c5fd; } 
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
    .modal-content { background: #e2e8f0; padding: 2.5rem 1rem 1rem 1rem; border: 5px solid #000; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 8px 8px 0 #000; }
    .close-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: 3px solid #000; width: 35px; height: 35px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 3px 3px 0 #000; z-index: 10; }
    .close-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }
    .sub-menu-btn { display: flex; align-items: center; padding: 1rem; background: #3b82f6; border: 4px solid #000; border-radius: 12px; margin-bottom: 1rem; cursor: pointer; color: white; font-weight: 600; box-shadow: 4px 4px 0 #000; transition: all 0.1s; text-align: left; }
    .sub-menu-btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 #000; background: #2563eb; }
    .sub-menu-btn i { font-size: 1.5rem; margin-right: 1rem; color: #fde047; text-shadow: 2px 2px 0 #000; }
    .sub-menu-btn div { font-size: 1rem; line-height: 1.2; }
    #iframeModal { padding: 0; } #iframeModal .modal-content { width: 100vw; height: 100vh; max-width: 100vw; max-height: 100vh; padding: 0; border: none; background: #000; box-shadow: none; border-radius: 0; } #iframeModal .close-btn { top: 10px; right: 10px; border-radius: 8px; } iframe { width: 100%; height: 100%; border: none; display: block; }
    .loading-box { text-align: center; width: 100%; padding: 3rem; background: #fff; border: 4px solid #000; box-shadow: 6px 6px 0 #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .err-title { color: #000; font-family: 'Press Start 2P', cursive; font-size: 1rem; margin-bottom: 10px; }
    .err-desc { font-family: 'Fredoka', sans-serif; margin-top: 10px; color: #64748b; }
    .mod-title { margin-top: 10px; margin-bottom: 1.5rem; color: #000; font-family: 'Press Start 2P', cursive; text-align: center; font-size: 0.9rem; line-height: 1.5; }
    .sub-jenis { opacity: 0.9; font-size: 0.85rem; font-weight: 500; }
    .sub-judul { font-weight: 700; }
    @media (min-width: 768px) { .header h1 { font-size: 1.5rem; } .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2rem; } .card i { font-size: 4rem; } .modal-content { padding: 2.5rem 1.5rem 1.5rem 1.5rem; } }
  </style>
</head>
<body>

  <div class="header">
    <h1 onclick="tampilMapel()">ARKA BELAJAR</h1>
  </div>

  <div class="container">
    <div id="navBab" class="nav-top">
      <button class="btn-back" onclick="tampilMapel()"><i class="fas fa-caret-left"></i> KEMBALI</button>
      <h2 id="judulMapelSaatIni" class="page-title">Pilih Bab</h2>
    </div>

    <div id="mainGrid" class="grid">
      <div class="loading-box" id="loadingBox">
        <h3 class="err-title"><i class="fas fa-spinner fa-spin"></i> MEMUAT...</h3>
        <p class="err-desc">Menghubungkan ke server...</p>
      </div>
    </div>
  </div>

  <div id="kontenModal" class="modal">
    <div class="modal-content">
      <div class="close-btn" onclick="tutupModal('kontenModal')">X</div>
      <h2 id="judulBabSaatIni" class="mod-title">Pilih Materi</h2>
      <div id="kontenList"></div>
    </div>
  </div>

  <div id="iframeModal" class="modal">
    <div class="modal-content">
      <div class="close-btn" onclick="tutupModal('iframeModal')">X</div>
      <iframe id="contentFrame" src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // ========================================================
    // PASTE LINK /exec GOOGLE APPS SCRIPT ANDA DI BAWAH INI:
    // ========================================================
    const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbw-x7qjibHqAuD_U-hfUyBbKRdTbzPhYdISgjlDDmGvGEqUd26W0oiqsPYJWmlhUg/exec";
    const API_URL = GOOGLE_APP_URL + "?p=api";

    let allData = [];
    let mapelAktif = '';

    window.onload = function() {
      // Fetch digunakan untuk menarik data dari luar server (dari GitHub ke Google)
      fetch(API_URL)
        .then(response => response.json())
        .then(response => {
          if (response.status === "error") {
            tampilkanError('DATA ERROR!', response.message);
            return;
          }
          allData = response.data || [];
          if(allData.length === 0) {
            tampilkanError('KOSONG!', 'Silakan isi dari halaman Admin Anda.');
          } else {
            tampilMapel(); 
          }
        })
        .catch(err => {
          tampilkanError('KONEKSI GAGAL!', 'Tidak bisa terhubung ke database. Pastikan link Google Script benar.');
          console.error(err);
        });
    };

    function tampilkanError(judul, deskripsi) {
      document.getElementById('mainGrid').innerHTML = '<div class="loading-box"><h3 class="err-title" style="color:#ef4444;">' + judul + '</h3><p class="err-desc">' + deskripsi + '</p></div>';
    }

    function tampilMapel() {
      document.getElementById('navBab').style.display = 'none';
      const grid = document.getElementById('mainGrid');
      grid.innerHTML = '';
      
      const mapels = [];
      for(let i=0; i<allData.length; i++) {
        if(mapels.indexOf(allData[i].mapel) === -1) { mapels.push(allData[i].mapel); }
      }
      
      const iconList = ['fa-gamepad', 'fa-book-open', 'fa-star', 'fa-rocket', 'fa-trophy', 'fa-cube'];
      
      for(let j=0; j<mapels.length; j++) {
        const mapel = mapels[j];
        const div = document.createElement('div');
        div.className = 'card';
        let randomIcon = iconList[j % iconList.length];
        div.innerHTML = '<i class="fas ' + randomIcon + '"></i><h2>' + mapel + '</h2>';
        div.onclick = function() { tampilBab(mapel); }; 
        grid.appendChild(div);
      }
    }

    function tampilBab(mapel) {
      mapelAktif = mapel;
      document.getElementById('navBab').style.display = 'flex';
      document.getElementById('judulMapelSaatIni').innerText = mapel.toUpperCase();
      
      const grid = document.getElementById('mainGrid');
      grid.innerHTML = '';
      
      const babs = [];
      for(let i=0; i<allData.length; i++) {
        if(allData[i].mapel === mapel && babs.indexOf(allData[i].bab) === -1) { babs.push(allData[i].bab); }
      }
      
      for(let j=0; j<babs.length; j++) {
        const bab = babs[j];
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = '<i class="fas fa-door-open"></i><h2>' + bab + '</h2>';
        div.onclick = function() { tampilKonten(mapel, bab); }; 
        grid.appendChild(div);
      }
    }

    function tampilKonten(mapel, bab) {
      document.getElementById('judulBabSaatIni').innerText = bab.toUpperCase();
      const list = document.getElementById('kontenList');
      list.innerHTML = '';
      
      const konten = [];
      for(let i=0; i<allData.length; i++) {
        if(allData[i].mapel === mapel && allData[i].bab === bab) { konten.push(allData[i]); }
      }
      
      for(let j=0; j<konten.length; j++) {
        const item = konten[j];
        const btn = document.createElement('div');
        btn.className = 'sub-menu-btn';
        
        let ikon = 'fa-play';
        if(item.jenis.toLowerCase().indexOf('buku') !== -1) ikon = 'fa-book-reader';
        if(item.jenis.toLowerCase().indexOf('quiz') !== -1) ikon = 'fa-gamepad';
        
        btn.innerHTML = '<i class="fas ' + ikon + '"></i> <div><span class="sub-jenis">' + item.jenis + '</span><br><span class="sub-judul">' + item.judul + '</span></div>';
        
        btn.onclick = function() {
          let url = item.url;
          if(url.indexOf('drive.google.com') !== -1) {
            const match = url.match(/[-\w]{25,}/);
            if(match) url = 'https://drive.google.com/file/d/' + match[0] + '/preview';
          }
          bukaIframe(url);
        };
        list.appendChild(btn);
      }
      document.getElementById('kontenModal').style.display = 'flex';
    }

    function bukaIframe(url) {
      document.getElementById('contentFrame').src = url;
      document.getElementById('iframeModal').style.display = 'flex';
    }

    function tutupModal(id) {
      document.getElementById(id).style.display = 'none';
      if(id === 'iframeModal') { document.getElementById('contentFrame').src = ''; }
    }
  </script>
</body>
</html>
